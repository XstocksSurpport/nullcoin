  <body>
    <div id="root"></div>
    <div id="boot-error" hidden class="panel" style="max-width:520px;margin:2rem auto;padding:1rem"></div>
    <script>
      function showBootError(msg) {
        var el = document.getElementById('boot-error')
        if (!el) return
        el.hidden = false
        el.textContent = msg
      }
      window.addEventListener('error', function (e) {
        showBootError(e.message || 'Failed to load app')
      })
      window.addEventListener('unhandledrejection', function (e) {
        var reason = e.reason
        showBootError(reason && reason.message ? reason.message : String(reason))
      })
    </script>
