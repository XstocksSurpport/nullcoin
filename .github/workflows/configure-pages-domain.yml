name: Configure Pages Domain

on:
  workflow_dispatch:

permissions:
  pages: write
  administration: write

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Enable custom domain and HTTPS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          curl -sS -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"},"cname":"null.baby","https_enforced":true}'
          curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages
