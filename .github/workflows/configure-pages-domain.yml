name: Configure Pages Domain

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/configure-pages-domain.yml'
      - 'web/public/CNAME'

permissions:
  contents: read
  pages: write
  administration: read

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Set custom domain and enforce HTTPS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          status=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/XstocksSurpport/nullcoin/pages)
          echo "Current pages API status: $status"
          if [ "$status" = "404" ]; then
            curl -sS -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/XstocksSurpport/nullcoin/pages \
              -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"},"cname":"null.baby","https_enforced":true}'
          else
            curl -sS -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/XstocksSurpport/nullcoin/pages \
              -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"},"cname":"null.baby","https_enforced":true}'
          fi
          echo ""
          curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/XstocksSurpport/nullcoin/pages | tee /tmp/pages-after.json
          echo ""
          grep -E '"cname"|"https_enforced"|"status"' /tmp/pages-after.json || true
